<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>衣櫃穿搭 · 小小黑開箱</title>
<style>
/* ============ 設計系統（內嵌 _design-system/design-system.css v1） ============ */
:root{
  --ink:#1f2a33;--text:#2a3340;--muted:#6b7683;--line:#dbe1df;--bg:#eef1ef;--card:#ffffff;
  --accent:#2c6e7f;--accent-soft:#e3eef0;
  --ok:#2e7d5b;--ok-soft:#e2f0e9;--warn:#b5761a;--warn-soft:#f6ecd9;--danger:#b4453c;--danger-soft:#f4e0dd;
  --radius:12px;--radius-sm:8px;--radius-lg:14px;--radius-pill:999px;
  --shadow:0 1px 2px rgba(31,42,51,.06),0 8px 24px rgba(31,42,51,.06);
  --shadow-hover:0 6px 18px rgba(23,40,58,.08);
  --wrap:1040px;--wrap-narrow:760px;
  --font:"PingFang TC","Noto Sans TC","Microsoft JhengHei",-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.6;font-size:15px;
  -webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;word-break:break-word;overflow-wrap:anywhere}
.wrap{max-width:var(--wrap);margin:0 auto;padding:22px 16px 96px}
.eyebrow{font-size:12px;letter-spacing:.16em;color:var(--accent);font-weight:700;text-transform:uppercase}
h1{font-size:27px;font-weight:800;letter-spacing:-.01em;margin:6px 0 8px;color:var(--ink)}
h2{font-size:16px;font-weight:800;color:var(--ink);margin:0 0 4px}
.lede{font-size:14.5px;color:var(--muted);max-width:46ch;line-height:1.6}
.hint{color:var(--muted);font-size:13px;margin:0 0 16px}
.muted{color:var(--muted)}
a{color:var(--accent)}
header.app{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:6px 2px 16px;
  border-bottom:2px solid var(--ink);margin-bottom:14px}
header.app h1{font-size:22px;letter-spacing:.5px;margin:0}
header.app .sub{color:var(--muted);font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);margin-bottom:16px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 18px}
.tab{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:9px 15px;border-radius:var(--radius-pill);cursor:pointer;font-size:15px;font-weight:700;
  transition:all .15s;font-family:inherit}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
button.btn,.btn{font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--ink);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);transition:all .15s}
.btn:hover{opacity:.9}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.accent{background:var(--accent);border-color:var(--accent)}
.btn.ok{background:var(--ok);border-color:var(--ok)}
.btn.warn{background:#fff;border-color:var(--warn);color:var(--warn)}
.btn.danger{background:#fff;border-color:var(--danger);color:var(--danger)}
.btn.lg{font-size:17px;padding:13px 26px}
.btn.sm{font-size:14px;padding:6px 12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
button.icon,.icon{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:6px;
  cursor:pointer;padding:4px 9px;font-size:13px;font-family:inherit;transition:all .12s}
.icon:hover{border-color:var(--accent);color:var(--accent)}
.icon.danger:hover{border-color:var(--danger);color:var(--danger)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
label.field{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--muted);font-weight:600}
input[type=text],input[type=date],input[type=number],input[type=month],select,textarea{
  font-family:inherit;font-size:15px;color:var(--text);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:9px 11px;background:#fff;min-width:120px;max-width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
textarea{min-width:200px;min-height:100px;resize:vertical;line-height:1.5;width:100%}
.switch{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);font-weight:600;cursor:pointer}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
th{font-size:12px;color:var(--muted);font-weight:700}
.chip{display:inline-block;padding:2px 9px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;
  background:var(--bg);color:var(--muted);border:1px solid var(--line);margin:2px 3px 2px 0}
.chip.cls{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.badge{display:inline-block;padding:2px 9px;border-radius:6px;font-size:12px;font-weight:700}
.badge.auto{background:var(--accent-soft);color:var(--accent)}
.badge.manual{background:var(--warn-soft);color:var(--warn)}
.badge.none{background:var(--danger-soft);color:var(--danger)}
.tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);
  padding:2px 9px;border-radius:var(--radius-pill)}
.notice{padding:12px 15px;border:1.5px solid #e2b4b4;background:#fdf2f2;border-radius:11px;color:#c0392b;
  font-size:13.5px;line-height:1.7;font-weight:600;margin:0 0 20px}
.dirty{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--warn-soft);
  border:1px solid #e6d3ad;color:#7a5410;border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;font-weight:600}
.empty{color:var(--muted);font-size:14px;padding:12px 2px}
.divider{height:1px;background:var(--line);margin:16px 0}
.kpi{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:10px}
.kpi div b{display:block;font-size:22px;color:var(--ink)}
.kpi div span{font-size:12px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 20px;border-radius:var(--radius-pill);font-size:14px;font-weight:600;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ---- 防橫向溢出（手機） ---- */
html,body{overflow-x:hidden}
body.modal-open{position:fixed;left:0;right:0;width:100%;overflow:hidden} /* 開彈窗時鎖定背景，避免 iOS 捲動卡住 */
img,canvas,video{max-width:100%}
.row>*,.filterbar>*{max-width:100%}
label.field{min-width:0}
select{max-width:100%}
@media(max-width:560px){
  .grid{grid-template-columns:1fr}
  header.app h1{font-size:19px}
  header.app{gap:6px;padding:4px 2px 12px;margin-bottom:10px}
  header.app .sub{font-size:12px}
  .wrap{padding:14px 10px 96px}
  .card{padding:14px 12px;margin-bottom:12px}
  .tabs{gap:5px;margin:0 0 12px}
  .tab{padding:8px 12px;font-size:14px}
  .row{gap:8px}
  .filterbar{gap:6px}
  .filterbar select,.filterbar input{font-size:13px;padding:6px 8px}
  button.btn,.btn{font-size:14px;padding:9px 14px}
  .btn.sm{font-size:13px;padding:6px 10px}
  .chipsel .c{padding:5px 11px;font-size:13px}
  .modal{padding:14px 12px 34px}
  input[type=text],input[type=date],input[type=number],select,textarea{min-width:0;font-size:16px} /* 16px 防 iOS 自動放大 */
  .dayrow .d{min-width:84px;font-size:14px}
  .dayrow .w{min-width:0;font-size:12.5px}
  .kpi{gap:14px}
  .kpi div b{font-size:19px}
  .outfitcard{padding:10px;gap:9px}
  .outfitcard .thumbs img{width:38px;height:48px}
  .itemgrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px}
  th,td{padding:7px 6px;font-size:13px}
}
@media print{.tabs,.no-print,header.app .sub{display:none!important}body{background:#fff}
  .card{box-shadow:none;border-color:#ccc}}

/* ============ 本工具專用樣式 ============ */
.itemgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
@media(min-width:700px){.itemgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
.itemcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:.15s;position:relative}
.itemcard:hover{border-color:var(--accent);box-shadow:var(--shadow-hover)}
.itemcard .ph{width:100%;aspect-ratio:3/4;object-fit:contain;display:block;
  background:repeating-conic-gradient(#f3f5f4 0 25%,#e9edeb 0 50%) 0 0/16px 16px}
.itemcard .nm{font-size:12.5px;font-weight:700;padding:6px 8px 2px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itemcard .meta{font-size:11px;color:var(--muted);padding:0 8px 7px}
.itemcard .fav{position:absolute;top:6px;right:6px;font-size:15px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.itemcard .cutflag{position:absolute;top:6px;left:6px}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.15);vertical-align:-1px}
.chipsel{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 10px}
.chipsel .c{border:1px solid var(--line);background:#fff;color:var(--muted);padding:6px 13px;
  border-radius:var(--radius-pill);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:.12s}
.chipsel .c.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(31,42,51,.45);z-index:100;display:flex;
  align-items:flex-end;justify-content:center;padding:0;overscroll-behavior:contain;touch-action:none}
@media(min-width:600px){.modal-bg{align-items:center;padding:24px}}
.modal{background:var(--bg);border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;width:100%;
  padding:18px 16px 40px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}
@media(min-width:600px){.modal{border-radius:16px;max-width:680px;padding:22px 22px 26px}}
.modal h2{font-size:18px;margin-bottom:10px}
.modal .close{float:right;font-size:20px;border:none;background:none;cursor:pointer;color:var(--muted);padding:2px 8px}
.pv{width:100%;max-height:320px;object-fit:contain;border-radius:var(--radius-sm);
  background:repeating-conic-gradient(#f3f5f4 0 25%,#e9edeb 0 50%) 0 0/16px 16px;border:1px solid var(--line)}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp img{width:100%;aspect-ratio:3/4;object-fit:contain;border-radius:var(--radius-sm);border:1px solid var(--line);
  background:repeating-conic-gradient(#f3f5f4 0 25%,#e9edeb 0 50%) 0 0/16px 16px}
.cmp .lb{text-align:center;font-size:12px;color:var(--muted);font-weight:700;margin-top:3px}
.progbar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0}
.progbar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .3s;width:0}
.fitcanvas{position:relative;width:100%;aspect-ratio:3/4;max-height:520px;background:#fff;
  border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;touch-action:none}
.fitcanvas .pc{position:absolute;cursor:grab;user-select:none;-webkit-user-drag:none;touch-action:none}
.fitcanvas .pc.sel{outline:2px dashed var(--accent);outline-offset:2px}
.fitcanvas .pc img{width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none}
.outfitcard{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:12px;margin-bottom:10px;cursor:pointer;transition:.15s}
.outfitcard:hover{border-color:var(--accent)}
.outfitcard .thumbs{display:flex;flex:none}
.outfitcard .thumbs img{width:44px;height:56px;object-fit:contain;border-radius:6px;border:1px solid var(--line);
  background:#fff;margin-right:-10px}
.dayrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--line);padding:10px 2px}
.dayrow .d{font-weight:800;color:var(--ink);min-width:96px}
.dayrow .w{font-size:13px;color:var(--muted);min-width:120px}
.picklist .outfitcard{margin-bottom:8px}
.checkline{display:flex;align-items:center;gap:9px;padding:7px 2px;border-bottom:1px dashed var(--line);font-size:14.5px}
.checkline:last-child{border-bottom:none}
.sec-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.filterbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filterbar select,.filterbar input{min-width:0;font-size:14px;padding:7px 9px}
.warnline{background:var(--warn-soft);border:1px solid #e6d3ad;color:#7a5410;border-radius:var(--radius-sm);
  padding:8px 12px;font-size:13.5px;font-weight:600;margin:8px 0}
.copybox{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;
  font-size:13.5px;white-space:pre-wrap;max-height:280px;overflow-y:auto;line-height:1.8}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.subtab{appearance:none;border:1px solid var(--line);background:#fff;color:var(--muted);padding:7px 13px;
  border-radius:var(--radius-pill);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.subtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.rangewrap{display:flex;align-items:center;gap:8px;font-size:14px}
.rangewrap input[type=number]{width:74px;min-width:74px}
.stack{display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>👗 衣櫃穿搭 <span class="tag">v1.9</span></h1>
    <span class="sub">出國打包選衣 × 日常穿搭 · 資料只存在這台裝置</span>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* =====================================================================
   衣櫃穿搭 APP v1 · 04-wardrobe
   單檔 HTML · IndexedDB · 內建瀏覽器端去背（@imgly/background-removal）
   ===================================================================== */

/* ---------------- 小工具 ---------------- */
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7).padEnd(5,'0');
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const fmtDate=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${y}/${+m}/${+d}`};
const weekday=s=>['日','一','二','三','四','五','六'][new Date(s+'T12:00:00').getDay()];
let toastTimer=null;
function toast(msg,ms){const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),ms||2400)}
function del2(btn,fn){ /* 兩段式刪除：第一下變確認 */
  if(btn.dataset.arm){fn();return}
  btn.dataset.arm='1';const old=btn.textContent;btn.textContent='確定刪？';
  btn.style.borderColor='var(--danger)';btn.style.color='var(--danger)';
  setTimeout(()=>{btn.dataset.arm='';btn.textContent=old;btn.style.borderColor='';btn.style.color=''},2200)}

/* ---------------- 常數 ---------------- */
const TYPES=['上衣','襯衫','針織/毛衣','外套','褲子','裙子','洋裝','鞋子','包包','配件'];
const LOWER_TYPES=['褲子','裙子'];
const SKIRT_TYPES=['裙子','洋裝'];
const SEASONS=['春','夏','秋','冬'];
const SIZES=['F','XXS','XS','S','M','L','XL','XXL'];
/* Claude 標註匯入用：常見說法 → 內建類型 */
const TYPE_ALIASES={'連身裙':'洋裝','連衣裙':'洋裝','洋裝':'洋裝','T恤':'上衣','背心':'上衣','無袖':'上衣',
 'polo':'上衣','帽T':'上衣','衛衣':'上衣','毛衣':'針織/毛衣','針織':'針織/毛衣','大衣':'外套','風衣':'外套',
 '夾克':'外套','羽絨':'外套','西裝外套':'外套','牛仔褲':'褲子','長褲':'褲子','短褲':'褲子','寬褲':'褲子','裙':'裙子'};
function normType(t){
  if(!t)return'';t=String(t).trim();
  if(TYPES.includes(t))return t;
  for(const k in TYPE_ALIASES)if(t.includes(k))return TYPE_ALIASES[k];
  for(const T of TYPES)if(t.includes(T)||T.includes(t))return T;
  return'';
}
/* 0 = 都可以（百搭／不確定）：讓使用者永遠不必勉強分類，配套時視為萬用、任何場合都合 */
const FORMALITY=[[0,'🤷 都可以'],[1,'很休閒'],[2,'休閒'],[3,'半正式(商務休閒)'],[4,'正式'],[5,'很正式']];
const SCENES=['上班','約會','運動','休閒','出遊','其他'];
const colorNameToHex=name=>{const e=COLOR_NAMES.find(([n])=>n===name);
  return e?'#'+e[1].map(v=>v.toString(16).padStart(2,'0')).join(''):'#cccccc'};
const COLOR_NAMES=[
 ['黑',[30,30,30]],['白',[245,245,245]],['灰',[128,128,128]],['米/杏',[225,210,185]],
 ['棕',[130,90,55]],['紅',[190,45,45]],['橘',[230,130,45]],['黃',[235,200,60]],
 ['綠',[70,140,80]],['藍',[60,100,180]],['深藍',[35,55,100]],['紫',[130,80,170]],['粉',[235,160,180]]];
/* 類型 → 預設適穿溫度（可再逐件調整） */
const TEMP_PRESET={'上衣':[18,32],'襯衫':[15,30],'針織/毛衣':[5,18],'外套':[0,18],'褲子':[5,32],
 '裙子':[15,32],'洋裝':[15,32],'鞋子':[0,40],'包包':[0,40],'配件':[0,40]};
const FORMALITY_LABEL=f=>({0:'都可以',1:'很休閒',2:'休閒',3:'半正式(商務休閒)',4:'正式',5:'很正式'}[f]??'都可以');
/* 自動配套用的分類群組與色彩規則 */
const TOP_TYPES=['上衣','襯衫','針織/毛衣'];
const BOTTOM_TYPES=['褲子','裙子'];
const NEUTRAL_COLORS=['黑','白','灰','米/杏','棕','深藍'];
const CLASH_PAIRS=[['紅','綠'],['紅','紫'],['橘','粉'],['橘','紫'],['黃','粉']];

/* ---------------- IndexedDB ---------------- */
const DB_NAME='wardrobe_v1',DB_VER=1;
let db=null;
function dbOpen(){return new Promise((res,rej)=>{
  const rq=indexedDB.open(DB_NAME,DB_VER);
  rq.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('items'))d.createObjectStore('items',{keyPath:'id'});
    if(!d.objectStoreNames.contains('outfits'))d.createObjectStore('outfits',{keyPath:'id'});
    if(!d.objectStoreNames.contains('trips'))d.createObjectStore('trips',{keyPath:'id'});
    if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv',{keyPath:'k'});};
  rq.onsuccess=e=>{db=e.target.result;res(db)};
  rq.onerror=e=>rej(e.target.error);
})}
const dbPut=(store,val)=>new Promise((res,rej)=>{const t=db.transaction(store,'readwrite');
  t.objectStore(store).put(val);t.oncomplete=res;t.onerror=e=>rej(e.target.error)});
const dbDel=(store,key)=>new Promise((res,rej)=>{const t=db.transaction(store,'readwrite');
  t.objectStore(store).delete(key);t.oncomplete=res;t.onerror=e=>rej(e.target.error)});
const dbAll=store=>new Promise((res,rej)=>{const rq=db.transaction(store).objectStore(store).getAll();
  rq.onsuccess=()=>res(rq.result);rq.onerror=e=>rej(e.target.error)});
const dbClear=store=>new Promise((res,rej)=>{const t=db.transaction(store,'readwrite');
  t.objectStore(store).clear();t.oncomplete=res;t.onerror=e=>rej(e.target.error)});

/* ---------------- 狀態（記憶體快取，來源=IndexedDB） ---------------- */

/* ---------------- 圖片處理：壓縮＋主色 ---------------- */
async function compressImage(file,maxSide,asPng){
  const bmp=await createImageBitmap(file);
  const sc=Math.min(1,(maxSide||600)/Math.max(bmp.width,bmp.height));
  const w=Math.round(bmp.width*sc),h=Math.round(bmp.height*sc);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  if(!asPng){ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h)} /* JPEG 無透明：先鋪白底，避免透明 PNG 進來變黑底 */
  ctx.drawImage(bmp,0,0,w,h);bmp.close&&bmp.close();
  return new Promise(r=>c.toBlob(r,asPng?'image/png':'image/jpeg',asPng?undefined:0.85));
}
async function dominantColor(blob){
  try{
    const bmp=await createImageBitmap(blob);
    const c=document.createElement('canvas');c.width=48;c.height=48;
    const ctx=c.getContext('2d',{willReadFrequently:true});
    ctx.drawImage(bmp,0,0,48,48);bmp.close&&bmp.close();
    const d=ctx.getImageData(0,0,48,48).data;
    const buckets={};
    for(let i=0;i<d.length;i+=4){
      const a=d[i+3];if(a<128)continue;
      const r=d[i],g=d[i+1],b=d[i+2];
      /* 去掉邊緣常見的近白背景權重：中央加權 */
      const px=(i/4)%48,py=Math.floor(i/4/48);
      const central=(px>8&&px<40&&py>8&&py<40)?3:1;
      const key=(r>>5)+'_'+(g>>5)+'_'+(b>>5);
      if(!buckets[key])buckets[key]={n:0,r:0,g:0,b:0};
      buckets[key].n+=central;buckets[key].r+=r*central;buckets[key].g+=g*central;buckets[key].b+=b*central;
    }
    let best=null;
    for(const k in buckets){const B=buckets[k];
      const rr=B.r/B.n,gg=B.g/B.n,bb=B.b/B.n;
      /* 跳過極亮近白（多半是背景／棚拍底） */
      if(rr>232&&gg>232&&bb>232)continue;
      if(!best||B.n>best.n)best={n:B.n,r:rr,g:gg,b:bb};}
    if(!best)return{hex:'#cccccc',name:'白'};
    const hex='#'+[best.r,best.g,best.b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
    return{hex,name:nearestColorName(best.r,best.g,best.b)};
  }catch(e){return{hex:'#cccccc',name:'—'}}
}
function nearestColorName(r,g,b){
  let bn='—',bd=1e9;
  for(const[name,[cr,cg,cb]]of COLOR_NAMES){
    const d=(r-cr)**2+(g-cg)**2+(b-cb)**2;
    if(d<bd){bd=d;bn=name}}
  /* 低彩度歸灰系 */
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  if(mx-mn<28){if(mx<70)return'黑';if(mx>215)return'白';if(mx>170&&r>g)return'米/杏';return'灰'}
  return bn;
}

/* ---------------- 新增流程：多選照片 → 逐張快速標註 ---------------- */
let addQueue=[],addIdx=0;
function addFlowStart(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{
    const files=[...inp.files];if(!files.length)return;
    toast(`處理 ${files.length} 張照片中…`);
    addQueue=[];let failN=0;
    for(const f of files){
      try{
        const blob=await compressImage(f,600);
        const col=await dominantColor(blob);
        addQueue.push({photo:blob,colorHex:col.hex,colorName:col.name});
      }catch(e){console.warn('照片處理失敗',e);failN++}
    }
    if(!addQueue.length){toast('照片全部讀取失敗（格式不支援？試試 JPG/PNG）',3600);return}
    if(failN)toast(`${failN} 張讀取失敗已略過（格式不支援？），其餘 ${addQueue.length} 張繼續`,3600);
    addIdx=0;addTagModal();
  };
  inp.click();
}

/* =====================================================================
   自動去背引擎（@imgly/background-removal · 瀏覽器端 WASM）
   首次使用需網路下載模型（小 ~55MB / 中 ~99MB），之後靠瀏覽器快取。
   ===================================================================== */
/* 必須用 jsdelivr 的 /+esm 端點：它會把相依套件（onnxruntime-web 等）自動解析成可用的 URL；
   直接載 /dist/index.mjs 會因為裸模組名 'onnxruntime-web' 無法解析而在推論階段失敗（所有裝置皆然）。 */
const BG_CDN='https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm';
let bgMod=null;
function bgPickModel(){
  if(SET.bgModel==='small'||SET.bgModel==='medium')return SET.bgModel==='small'?'isnet_quint8':'isnet_fp16';
  /* auto：行動裝置記憶體較緊 → 小模型；桌機 → 中模型 */
  const mobile=/iPhone|iPad|Android/i.test(navigator.userAgent);
  return mobile?'isnet_quint8':'isnet_fp16';
}
async function bgLoad(){
  if(bgMod)return bgMod;
  if(!navigator.onLine){const e=new Error('離線');e.stage='offline';throw e}
  try{bgMod=await import(BG_CDN)}
  catch(err){const e=new Error('載入去背程式失敗');e.stage='load';throw e}
  return bgMod;
}
/* onProgress(cur,tot)；modelOverride 可強制指定模型（重試用） */
async function bgRemoveOne(blob,onProgress,modelOverride){
  const mod=await bgLoad();
  let reachedDownload=false;
  try{
    return await mod.removeBackground(blob,{
      model:modelOverride||bgPickModel(),device:'cpu',output:{format:'image/png'},
      progress:(key,cur,tot)=>{if(key&&key.startsWith('fetch')){reachedDownload=true;
        if(onProgress&&tot>0)onProgress(cur,tot,key)}}
    });
  }catch(err){
    const e=new Error(err&&err.message||'去背失敗');
    e.stage=reachedDownload?'infer':'download';e.raw=err;throw e;
  }
}
/* 先用預設模型，失敗且非最小模型 → 自動改用最小模型重試一次 */
async function bgRun(blob,onProgress){
  try{return await bgRemoveOne(blob,onProgress)}
  catch(e){
    if(e.stage==='infer'&&bgPickModel()!=='isnet_quint8'){
      if(onProgress)onProgress(0,1,'retry');
      return await bgRemoveOne(blob,onProgress,'isnet_quint8'); /* 記憶體不足 → 換最小模型再試 */
    }
    throw e;
  }
}
function bgFailModal(e){
  console.warn('去背失敗',e);
  const stage=e&&e.stage;
  const why=stage==='offline'?'目前離線——去背首次需要網路下載模型。':
    stage==='load'?'去背程式沒載入成功（多半是網路擋住了 CDN）。':
    stage==='download'?'去背模型沒下載完成（網路不穩或被擋）。':
    stage==='infer'?'你的裝置跑不動這個去背模型——iPhone 常因記憶體不足失敗（這是已知限制）。':
    '去背沒成功。';
  openModal(`
    <button class="close" onclick="closeModal()">✕</button>
    <h2>😵 去背沒成功</h2>
    <p class="hint" style="margin-bottom:12px">${why}</p>
    <b style="font-size:13.5px">你可以這樣做：</b>
    <div class="stack" style="margin-top:8px">
      <div class="okbox" style="background:var(--accent-soft);border-color:transparent;color:var(--text)">
        <b>💬 讓 Claude 幫你去背（最推薦，尤其 iPhone）</b><br>
        把衣服照片傳進和我（Claude）的對話，我在雲端幫你去背，回傳 PNG／或直接生一個「匯入就整櫃好」的備份檔。
      </div>
      <button class="btn ghost" onclick="closeModal()">🔁 關掉、稍後在 Wi-Fi 下再試一次（可能是網路）</button>
      <p class="hint">或：這件先用原圖也完全能用——去背只是讓拼貼圖更好看，不影響其他功能。</p>
    </div>`);
}
/* ---- 單張 ---- */
async function bgSingle(id){
  const it=itemById(id);if(!it||!it.photo)return;
  openModal(`<h2>🪄 自動去背中…</h2>
    <p class="hint" id="bgMsg">準備模型（首次使用需下載，請耐心等）…</p>
    <div class="progbar"><i id="bgBar"></i></div>`);
  try{
    const cut=await bgRun(it.photo,(cur,tot,key)=>{
      const m=$('bgMsg');if(!m)return;
      if(key==='retry'){m.textContent='換較小的模型再試一次…';$('bgBar').style.width='0%';return}
      m.textContent=`下載去背模型… ${(cur/1048576).toFixed(0)} / ${(tot/1048576).toFixed(0)} MB`;
      $('bgBar').style.width=Math.round(100*cur/tot)+'%';});
    bgPreviewConfirm([{it,cut}],0);
  }catch(e){closeModal();bgFailModal(e)}

/* ---- 批次 ---- */
let bgBatchStopFlag=false;
async function bgBatchStart(){
  const targets=ITEMS.filter(x=>x.photo&&!x.cut);
  if(!targets.length){toast('沒有待去背的衣物');return}
  bgBatchStopFlag=false;
  openModal(`<h2>🪄 批次去背（共 ${targets.length} 件）</h2>
    <p class="hint" id="bgMsg">準備模型（首次使用需下載數十 MB，之後會快取）…</p>
    <div class="progbar"><i id="bgBar"></i></div>
    <p class="hint" id="bgCount"></p>
    <img class="pv" id="bgNow" style="max-height:180px;display:none">
    <button class="btn warn" onclick="bgBatchStopFlag=true;this.textContent='收到，跑完這張就停'">先停在這裡</button>
    <p class="hint" style="margin-top:8px">跑完會逐張給你預覽確認，不會直接覆蓋。</p>`);
  const done=[];
  try{
    for(let i=0;i<targets.length;i++){
      if(bgBatchStopFlag)break;
      const it=targets[i];
      $('bgCount').textContent=`第 ${i+1} / ${targets.length} 件：${it.name||it.type}`;
      const nowImg=$('bgNow');nowImg.src=urlCache.getOrig(it);nowImg.style.display='block';
      const cut=await bgRun(it.photo,(cur,tot,key)=>{
        const m=$('bgMsg');if(!m)return;
        if(key==='retry'){m.textContent='換較小的模型再試一次…';return}
        m.textContent=`下載去背模型… ${(cur/1048576).toFixed(0)} / ${(tot/1048576).toFixed(0)} MB`;
        $('bgBar').style.width=Math.round(100*cur/tot)+'%';});
      $('bgMsg').textContent='模型已就緒，逐張處理中…';
      $('bgBar').style.width=Math.round(100*(i+1)/targets.length)+'%';
      done.push({it,cut});
    }
  }catch(e){
    if(!done.length){closeModal();bgFailModal(e);return}
    toast('中途發生錯誤，先確認已完成的部分');
  }
  if(!done.length){closeModal();toast('已取消');return}
  bgPreviewConfirm(done,0);
}
/* ---- 逐張預覽確認 ---- */
function bgPreviewConfirm(results,idx){

    <h2>去背預覽 <span class="tag">${idx+1} / ${results.length}</span></h2>
    <p class="hint">${esc(it.name||it.type)}</p>
    <div class="cmp">
      <div><img src="${urlCache.getOrig(it)}"><div class="lb">原圖</div></div>
      <div><img src="${cutUrl}"><div class="lb">去背後</div></div>
    </div>
    <label class="switch" style="margin:12px 0 4px">
      <input type="checkbox" id="bgKeepOrig" ${SET.keepOriginal?'checked':''}>採用後仍保留原圖（較占空間）</label>
    <div class="row" style="margin-top:10px">
      <button class="btn ok" onclick="bgApplyOne(${idx})">✔ 採用去背圖</button>
      <button class="btn ghost" onclick="bgEditCut(${idx})">🧽 先修一下（擦手/衣架）</button>
      <button class="btn ghost" onclick="bgSkipPrev(${idx})">✘ 不採用，保留原圖</button>
    </div>`);
  window._bgResults=results;
}
async function bgApplyOne(idx){
  const results=window._bgResults;const{it,cut}=results[idx];
  const keep=$('bgKeepOrig').checked;
  SET.keepOriginal=keep;saveSet();
  it.cut=await compressImage(cut,600,true);
  if(!keep)it.photo=null; /* 刪原圖省空間；去背圖即為顯示來源 */

  results[idx].applied=true;
  await saveItem(it);
  bgPreviewConfirm(results,idx+1);
}
function bgSkipPrev(idx){bgPreviewConfirm(window._bgResults,idx+1)}

/* =====================================================================
   🧽 去背橡皮擦：手動擦掉手、衣架、殘留背景（觸控＋滑鼠）
   ===================================================================== */
let ecState=null;
async function editCutOpen(blob,onDone,onCancel,origBlob){
  const bmp=await createImageBitmap(blob);
  const origBmp=origBlob?await createImageBitmap(origBlob):null;
  openModal(`
    <h2>🧽 修圖</h2>
    <p class="hint">手＋衣架通常在上方 → 用「▭ 框選擦」<b>拖一個框一次擦掉</b>最快；細節再用「🖌 塗抹擦」；${origBmp?'誤刪的衣服用「🩹 補回」刷回來；':''}擦壞按「全部重來」。</p>
    <div class="subtabs" style="margin-bottom:8px">
      <button class="subtab active" id="ecModeBox" onclick="ecSetMode('box')">▭ 框選擦</button>
      <button class="subtab" id="ecModeErase" onclick="ecSetMode('erase')">🖌 塗抹擦</button>
      ${origBmp?'<button class="subtab" id="ecModeRestore" onclick="ecSetMode(\'restore\')">🩹 補回</button>':''}
    </div>
    <canvas id="ecCanvas" style="width:100%;max-height:52vh;touch-action:none;border:1px solid var(--line);
      border-radius:8px;background:repeating-conic-gradient(#f3f5f4 0 25%,#e9edeb 0 50%) 0 0/16px 16px"></canvas>
    <div class="row" style="margin:10px 0;align-items:center">
      <label class="field" style="flex:1">筆刷大小
        <input type="range" id="ecBrush" min="8" max="80" value="26" style="width:100%"></label>
      <button class="btn ghost sm" onclick="ecRestore()">全部重來</button>
    </div>
    <div class="row">
      <button class="btn ok" onclick="ecFinish()">✔ 完成</button>
      <button class="btn ghost" onclick="ecCancel()">取消</button>
    </div>`);
  const c=$('ecCanvas');
  c.width=bmp.width;c.height=bmp.height;
  /* 顯示大小由 CSS 控制；內部維持原解析度 */
  const ctx=c.getContext('2d');
  ctx.drawImage(bmp,0,0);
  ecState={c,ctx,bmp,origBmp,onDone,onCancel,down:false,mode:'box',snap:null,boxStart:null};
  const xyOf=e=>{const r=c.getBoundingClientRect();const sx=c.width/r.width,sy=c.height/r.height;
    return{sx,sy,x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy}};
  const brushAt=e=>{
    const {sx,sy,x,y}=xyOf(e);
    const rad=(+$('ecBrush').value||26)*Math.max(sx,sy);
    ctx.save();
    if(ecState.mode==='restore'&&ecState.origBmp){
      /* 補回：以圓形裁切，把原圖畫回來 */
      ctx.globalCompositeOperation='source-over';
      ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.clip();
      ctx.drawImage(ecState.origBmp,0,0,c.width,c.height);
    }else{
      ctx.globalCompositeOperation='destination-out';
      ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  };
  const snapshot=()=>{const s=document.createElement('canvas');s.width=c.width;s.height=c.height;
    s.getContext('2d').drawImage(c,0,0);return s};
  const boxRect=e=>{const {x,y}=xyOf(e);const b=ecState.boxStart;
    return[Math.min(b.x,x),Math.min(b.y,y),Math.abs(x-b.x),Math.abs(y-b.y)]};
  const boxPreview=e=>{ctx.drawImage(ecState.snap,0,0);
    ctx.save();ctx.strokeStyle='#2c6e7f';ctx.lineWidth=Math.max(2,c.width/200);ctx.setLineDash([9,6]);
    ctx.strokeRect(...boxRect(e));ctx.restore()};
  const boxCommit=e=>{ctx.drawImage(ecState.snap,0,0);
    ctx.save();ctx.globalCompositeOperation='destination-out';ctx.fillRect(...boxRect(e));ctx.restore()};
  c.addEventListener('pointerdown',e=>{ecState.down=true;c.setPointerCapture(e.pointerId);
    if(ecState.mode==='box'){ecState.snap=snapshot();ecState.boxStart=xyOf(e)}else brushAt(e);e.preventDefault()});
  c.addEventListener('pointermove',e=>{if(!ecState||!ecState.down)return;
    if(ecState.mode==='box'){if(ecState.snap)boxPreview(e)}else brushAt(e)});
  c.addEventListener('pointerup',e=>{if(!ecState)return;
    if(ecState.mode==='box'&&ecState.down&&ecState.snap){boxCommit(e);ecState.snap=null;ecState.boxStart=null}
    ecState.down=false});
  c.addEventListener('pointercancel',()=>{if(!ecState)return;ecState.down=false;
    if(ecState.snap){ctx.drawImage(ecState.snap,0,0);ecState.snap=null;ecState.boxStart=null}});
}
function ecSetMode(m){
  if(!ecState)return;
  ecState.mode=m;ecState.snap=null;ecState.boxStart=null;
  const set=(id,on)=>{const el=$(id);if(el)el.classList.toggle('active',on)};
  set('ecModeBox',m==='box');set('ecModeErase',m==='erase');set('ecModeRestore',m==='restore');
}
function ecRestore(){
  if(!ecState)return;
  const{ctx,c,bmp}=ecState;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(bmp,0,0);
}
function ecFinish(){
  if(!ecState)return;
  const{c,bmp,origBmp,onDone}=ecState;
  c.toBlob(b=>{bmp.close&&bmp.close();origBmp&&origBmp.close&&origBmp.close();
    const done=onDone;ecState=null;done(b)},'image/png');
}
function ecCancel(){
  if(!ecState)return;
  const{bmp,origBmp,onCancel}=ecState;
  bmp.close&&bmp.close();origBmp&&origBmp.close&&origBmp.close();
  const cb=onCancel;ecState=null;cb();
}
/* 去背預覽中開修圖（有原圖 → 支援補回） */
function bgEditCut(idx){

/* ---------------- 規則式自動配套引擎（搭配頁與旅程共用） ----------------
   誠實界線：只做規則（溫度區間、正式度接近、季節、色彩不打架、少穿優先），
   不是 AI 美感；結果可換一批、可再手調。 */
function tempOverlap(it,tmin,tmax){
  if(tmin==null||tmax==null)return true;
  return it.tempMin<=tmax&&it.tempMax>=tmin;
}
function comboColorScore(items){
  const nonNeutral=[...new Set(items.map(x=>x.colorName).filter(c=>c&&!NEUTRAL_COLORS.includes(c)))];
  let s=0;
  if(nonNeutral.length<=1)s+=2;            /* 中性色＋最多一個亮色最安全 */
  else if(nonNeutral.length===2)s+=0.5;
  else s-=2;                               /* 三個以上亮色扣分 */
  for(const[a,b]of CLASH_PAIRS)
    if(nonNeutral.includes(a)&&nonNeutral.includes(b))s-=2.5;
  return s;
}
function comboScore(items,opt){
  let s=comboColorScore(items);
  /* 正式度一致：「都可以(0)」與未設定者視為萬用，不列入落差計算、也符合任何場景 */
  const fs=items.filter(x=>!['鞋子','包包','配件'].includes(x.type)).map(x=>x.formality).filter(f=>f>0);
  if(fs.length>1)s-=(Math.max(...fs)-Math.min(...fs))*0.8;
  if(opt&&opt.scene){
    const wantF=opt.scene==='上班'?[2,3,4]:opt.scene==='運動'?[1,2]:opt.scene==='約會'?[2,3,4]:[1,2,3,4,5];
    if(fs.every(f=>wantF.includes(f)))s+=1; /* fs 全空(全萬用)→every 為真→任何場景都合 */
  }
  /* 最愛加分、少穿的加一點分（讓冷板凳衣物出場） */
  s+=items.filter(x=>x.fav).length*0.6;
  s+=items.reduce((a,x)=>a+1/(1+(x.wearCount||0)),0)*0.3;
  return s;
}
function pickWeighted(arr,n){ /* 依分數帶隨機抽 n 個候選 */
  const out=[];const pool=arr.slice();
  while(out.length<n&&pool.length){
    const total=pool.reduce((a,x)=>a+Math.exp(x.score),0);
    let r=Math.random()*total;
    let idx=0;
    for(let i=0;i<pool.length;i++){r-=Math.exp(pool[i].score);if(r<=0){idx=i;break}}
    out.push(pool[idx]);pool.splice(idx,1);
  }
  return out;
}
/* 產生一套（回傳 items 陣列）；usage=Map(id→已用天數)（旅程重穿規則用），可為 null */
function genCombo(opt){
  opt=opt||{};
  const usage=opt.usage||null;
  /* 每件可穿幾天上限：標「只穿一次」或被指定為某天特殊單品的，整趟只排 1 天 */
  const onceIds=opt.onceIds||null;
  const limitOf=it=>(it.onceOnly||(onceIds&&onceIds.has(it.id)))?1
    :(TOP_TYPES.includes(it.type)||it.type==='洋裝')?(+SET.washTop||1)
    :BOTTOM_TYPES.includes(it.type)?(+SET.washBottom||3):999;
  const anchor=opt.anchorId?itemById(opt.anchorId):null;
  const avail=it=>it!==anchor&&tempOverlap(it,opt.tempMin,opt.tempMax)
    &&(!usage||(usage.get(it.id)||0)<limitOf(it))
    &&(!opt.season||!(it.seasons||[]).length||(it.seasons||[]).includes(opt.season));
  const tops=ITEMS.filter(x=>TOP_TYPES.includes(x.type)&&avail(x));
  const bottoms=ITEMS.filter(x=>BOTTOM_TYPES.includes(x.type)&&avail(x));
  const dresses=ITEMS.filter(x=>x.type==='洋裝'&&avail(x));
  const outers=ITEMS.filter(x=>x.type==='外套'&&avail(x));
  const needOuter=opt.tempMin!=null&&opt.tempMin<=18&&outers.length>0;
  const cands=[];
  const tryPush=(items)=>{if(items.every(Boolean))cands.push({items,score:comboScore(items,opt)})};
  if(anchor){
    /* 指定「這件一定要出現」：以它為主軸湊一套（特殊場合／拍單品指定） */
    const at=anchor.type;
    if(TOP_TYPES.includes(at)){for(const b of bottoms){if(needOuter)for(const o of outers)tryPush([anchor,b,o]);else tryPush([anchor,b])}}
    else if(BOTTOM_TYPES.includes(at)){for(const tp of tops){if(needOuter)for(const o of outers)tryPush([tp,anchor,o]);else tryPush([tp,anchor])}}
    else if(at==='洋裝'){if(needOuter)for(const o of outers)tryPush([anchor,o]);else tryPush([anchor])}
    else if(at==='外套'){for(const tp of tops)for(const b of bottoms)tryPush([tp,b,anchor]);for(const d of dresses)tryPush([d,anchor])}
    else{for(const tp of tops)for(const b of bottoms)tryPush([tp,b,anchor]);for(const d of dresses)tryPush([d,anchor])}
    if(!cands.length)tryPush([anchor]); /* 湊不出來就至少單穿這件 */
  }else{
    /* 上衣＋下身組合 */
    for(const t of tops)for(const b of bottoms){
      const base=[t,b];
      if(needOuter){for(const o of outers)tryPush([...base,o])}
      else tryPush(base);
    }
    /* 洋裝路線 */
    for(const d of dresses){
      if(needOuter){for(const o of outers)tryPush([d,o])}
      else tryPush([d]);
    }
  }
  if(!cands.length)return null;
  cands.sort((a,b)=>b.score-a.score);
  return pickWeighted(cands.slice(0,30),1)[0].items;
}

/* ---------------- ✨ 幫「這一件」配（拍單品 → 從衣櫃挑能搭的） ----------------
   不用先建整個衣櫃：拍你想穿的那件，用現有的其他衣物湊出完整一套。
   湊不出來就誠實說缺什麼，並提供「看別人怎麼搭這件」。 */
function pairSuggest(anchor,opt){
  opt=opt||{};
  const avail=it=>it.id!==anchor.id&&tempOverlap(it,opt.tempMin,opt.tempMax);
  const tops=ITEMS.filter(x=>TOP_TYPES.includes(x.type)&&avail(x));
  const bottoms=ITEMS.filter(x=>BOTTOM_TYPES.includes(x.type)&&avail(x));
  const dresses=ITEMS.filter(x=>x.type==='洋裝'&&avail(x));
  const outers=ITEMS.filter(x=>x.type==='外套'&&avail(x));
  const needOuter=opt.tempMin!=null&&opt.tempMin<=18&&outers.length>0;
  const cands=[],missing=[];
  const push=items=>{if(items.every(Boolean))cands.push({items,score:comboScore(items,opt)})};
  const t=anchor.type;
  if(TOP_TYPES.includes(t)){
    if(!bottoms.length)missing.push('下身（褲子／裙子）');
    for(const b of bottoms){if(needOuter)for(const o of outers)push([anchor,b,o]);else push([anchor,b])}
  }else if(BOTTOM_TYPES.includes(t)){
    if(!tops.length)missing.push('上衣');
    for(const tp of tops){if(needOuter)for(const o of outers)push([tp,anchor,o]);else push([tp,anchor])}
  }else if(t==='洋裝'){
    if(needOuter)for(const o of outers)push([anchor,o]);else push([anchor]);
  }else if(t==='外套'){
    if(!(tops.length&&bottoms.length)&&!dresses.length)missing.push('一套內搭（上衣＋下身，或洋裝）');
    for(const tp of tops)for(const b of bottoms)push([tp,b,anchor]);
    for(const d of dresses)push([d,anchor]);
  }else{ /* 鞋/包/配件 → 主體一套＋這件 */
    if(!(tops.length&&bottoms.length)&&!dresses.length)missing.push('一套主體（上衣＋下身，或洋裝）');
    for(const tp of tops)for(const b of bottoms){if(needOuter)for(const o of outers)push([tp,b,o,anchor]);else push([tp,b,anchor])}
    for(const d of dresses)push([d,anchor]);
  }
  cands.sort((a,b)=>b.score-a.score);
  const seen=new Set(),out=[];
  for(const c of cands){const k=c.items.map(x=>x.id).sort().join('|');if(seen.has(k))continue;seen.add(k);out.push(c.items);if(out.length>=6)break}
  return{combos:out,missing};
}

let fitSelId=null;
function fitCanvasRender(){
  const cv=$('fitCanvas');if(!cv)return;
  cv.innerHTML=fitEdit.layout.map(l=>{
    const it=itemById(l.itemId);if(!it)return'';
    return `<div class="pc ${fitSelId===l.itemId?'sel':''}" data-id="${l.itemId}"
      style="left:${l.x}%;top:${l.y}%;width:${l.w}%;z-index:${l.z}">
      <img src="${urlCache.get(it)}"></div>`}).join('');
  [...cv.children].forEach(el=>{
    el.addEventListener('pointerdown',fitDragStart);
  });
}
let dragCtx=null;
function fitDragStart(e){
  const el=e.currentTarget;const id=el.dataset.id;
  fitSelId=id;
  const l=fitEdit.layout.find(x=>x.itemId===id);
  const cv=$('fitCanvas');const r=cv.getBoundingClientRect();
  dragCtx={id,el,startX:e.clientX,startY:e.clientY,origX:l.x,origY:l.y,rect:r,moved:false};
  el.setPointerCapture(e.pointerId);
  el.addEventListener('pointermove',fitDragMove);
  el.addEventListener('pointerup',fitDragEnd);
  el.addEventListener('pointercancel',fitDragEnd);
  [...cv.children].forEach(c=>c.classList.toggle('sel',c.dataset.id===id));
  const sc=$('foScale');if(sc)sc.value=l.w;
  e.preventDefault();
}
function fitDragMove(e){
  if(!dragCtx)return;
  const l=fitEdit.layout.find(x=>x.itemId===dragCtx.id);
  const dx=100*(e.clientX-dragCtx.startX)/dragCtx.rect.width;
  const dy=100*(e.clientY-dragCtx.startY)/dragCtx.rect.height;
  if(Math.abs(dx)+Math.abs(dy)>1)dragCtx.moved=true;
  l.x=Math.max(-10,Math.min(95,dragCtx.origX+dx));
  l.y=Math.max(-5,Math.min(95,dragCtx.origY+dy));
  dragCtx.el.style.left=l.x+'%';dragCtx.el.style.top=l.y+'%';
}
function fitDragEnd(e){
  if(!dragCtx)return;
  dragCtx.el.removeEventListener('pointermove',fitDragMove);
  dragCtx.el.removeEventListener('pointerup',fitDragEnd);
  dragCtx.el.removeEventListener('pointercancel',fitDragEnd);
  dragCtx=null;
}
function fitScaleSel(v){
  if(!fitSelId)return;
  const l=fitEdit.layout.find(x=>x.itemId===fitSelId);if(!l)return;
  l.w=+v;fitCanvasRender();
}
function fitFront(){
  if(!fitSelId)return;
  const l=fitEdit.layout.find(x=>x.itemId===fitSelId);if(!l)return;
  const maxZ=Math.max(...fitEdit.layout.map(x=>x.z));
  l.z=maxZ+1;
  fitCanvasRender();
}
function fitSceneTog(btn,s){
  const a=fitEdit.scenes=fitEdit.scenes||[];
  const i=a.indexOf(s);if(i>=0)a.splice(i,1);else a.push(s);
  btn.classList.toggle('on');
}
function fitBikeWarn(){
  const w=$('foBikeWarn');if(!w)return;
  if(fitEdit.conditions&&fitEdit.conditions.bike){
    const hasSkirt=fitEdit.itemIds.some(id=>{const it=itemById(id);

  }else w.innerHTML='';
}

/* ---- 拼貼圖匯出 ---- */
async function fitCollage(){
  const o=fitEdit;
  const W=1080,H=1594;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  /* 依 layout 畫；畫布區域嚴格 3:4，與編輯畫布同比例（座標不變形） */
  const area={x:40,y:120,w:W-80,h:Math.round((W-80)*4/3)};
  ctx.fillStyle='#f6f8f7';ctx.fillRect(area.x,area.y,area.w,area.h);
  const sorted=o.layout.slice().sort((a,b)=>a.z-b.z);
  for(const l of sorted){
    const it=itemById(l.itemId);if(!it)continue;
    const blob=it.cut||it.photo;if(!blob)continue;
    const bmp=await createImageBitmap(blob);
    const w=area.w*l.w/100;
    const h=w*bmp.height/bmp.width;
    ctx.drawImage(bmp,area.x+area.w*l.x/100,area.y+area.h*l.y/100,w,h);
    bmp.close&&bmp.close();
  }
  /* 標題與資訊 */
  ctx.fillStyle='#1f2a33';ctx.font='700 44px "PingFang TC","Noto Sans TC",sans-serif';
  ctx.fillText(o.name||'我的穿搭',40,78);
  ctx.fillStyle='#6b7683';ctx.font='26px "PingFang TC","Noto Sans TC",sans-serif';
  const meta=[(o.scenes||[]).join('·'),todayStr()].filter(Boolean).join('　');
  ctx.fillText(meta,40,H-90);
  const names=o.itemIds.map(id=>{const it=itemById(id);return it?(it.name||it.type):''}).filter(Boolean).join(' / ');
  ctx.font='22px "PingFang TC","Noto Sans TC",sans-serif';
  ctx.fillText(names.slice(0,60),40,H-50);
  c.toBlob(b=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download=`穿搭_${(o.name||'未命名').replace(/[\\/:*?"<>|]/g,'')}_${todayStr()}.png`;
    a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast('拼貼圖已下載');
  },'image/png');
}

async function tripGeoSearch(which){

  try{

      +encodeURIComponent(q)+'&count=5&language=zh&format=json');
    const j=await r.json();
    if(!j.results||!j.results.length){$(boxId).innerHTML='<p class="hint">查不到，換個寫法試試（或直接建立、之後手動輸溫度）。</p>';return}

    $(boxId).innerHTML=j.results.map((g,i)=>
      `<button class="subtab" style="margin:2px" onclick="tripGeoPick(${i},'${which}')">

/* ---- 自動排整趟（單品重穿、重新組合） ---- */
async function tripAutoSchedule(tid){
  const t=TRIPS.find(x=>x.id===tid);if(!t)return;
  if(!ITEMS.length){toast('衣櫃還沒有衣物');return}
  /* 用量統計：手動配的天先計入（自動排要避開已用滿的單品） */
  const usage=new Map();
  t.days.forEach(d=>{if(d.outfitId){dayItems(d).forEach(it=>
    usage.set(it.id,(usage.get(it.id)||0)+1))}});
  /* 被指定為某天特殊單品的，整趟只穿那一天，其餘天要避開 */
  const onceIds=new Set(t.days.filter(d=>d.pinItem).map(d=>d.pinItem));
  let filled=0,failed=0;
  /* 先排「這天指定特殊單品」的天，把那件鎖進去 */
  for(const d of t.days){
    if(d.outfitId||!d.pinItem)continue;
    const items=genCombo({tempMin:d.tempMin,tempMax:d.tempMax,usage,anchorId:d.pinItem,onceIds});
    if(!items){d.autoItems=null;failed++;continue}
    d.autoItems=items.map(x=>x.id);
    items.forEach(it=>usage.set(it.id,(usage.get(it.id)||0)+1));
    filled++;
  }
  /* 再排其餘天（重穿規則＋只穿一次＋指定單品避開，都在 genCombo 內處理） */
  for(const d of t.days){
    if(d.outfitId||d.pinItem)continue; /* 手動配的、已指定特殊單品的不動 */
    const items=genCombo({tempMin:d.tempMin,tempMax:d.tempMax,usage,onceIds});
    if(!items){d.autoItems=null;failed++;continue}
    d.autoItems=items.map(x=>x.id);
    items.forEach(it=>usage.set(it.id,(usage.get(it.id)||0)+1));
    filled++;
  }
  await saveTrip(t);render();
  toast(failed
    ?`已排 ${filled} 天；有 ${failed} 天配不出來——上衣或褲裙在重穿規則下不夠用，考慮現場洗衣或多帶幾件`
    :`已自動排 ${filled} 天（再按一次會重新洗牌）`,4200);
}

async function tripFetchWeather(tid){
  const t=TRIPS.find(x=>x.id===tid);
  if(t.lat==null){toast('沒有城市座標，請手動輸溫度（或重建旅程時選城市）');return}
  if(!navigator.onLine){toast('目前離線，請手動輸溫度');return}
  toast('抓取預報中…');
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${t.lat}&longitude=${t.lon}`
      +`&daily=temperature_2m_min,temperature_2m_max,precipitation_probability_max,weather_code`
      +`&timezone=auto&start_date=${t.days[0].date}&end_date=${t.days[t.days.length-1].date}`);
    if(!r.ok)throw new Error('http '+r.status);
    const j=await r.json();
    if(!j.daily||!j.daily.time)throw new Error('no data');
    let filled=0;
    j.daily.time.forEach((ds,k)=>{
      const d=t.days.find(x=>x.date===ds);
      if(d&&!d.manual){
        d.tempMin=Math.round(j.daily.temperature_2m_min[k]);
        d.tempMax=Math.round(j.daily.temperature_2m_max[k]);
        d.precip=j.daily.precipitation_probability_max?j.daily.precipitation_probability_max[k]:null;
        d.code=j.daily.weather_code?j.daily.weather_code[k]:null;
        filled++}});
    /* 出發地兩端溫度（移動日用） */
    if(t.homeLat!=null){
      try{
        const r2=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${t.homeLat}&longitude=${t.homeLon}`
          +`&daily=temperature_2m_min,temperature_2m_max&timezone=auto`
          +`&start_date=${t.days[0].date}&end_date=${t.days[t.days.length-1].date}`);
        const j2=await r2.json();
        if(j2.daily&&j2.daily.time&&j2.daily.time.length){
          const first=0,last=j2.daily.time.length-1;
          t.homeTemp={
            start:[Math.round(j2.daily.temperature_2m_min[first]),Math.round(j2.daily.temperature_2m_max[first])],
            end:[Math.round(j2.daily.temperature_2m_min[last]),Math.round(j2.daily.temperature_2m_max[last])]};
        }
      }catch(e){console.warn('出發地天氣抓取失敗',e)}
    }
    await saveTrip(t);render();
    toast(filled?`已更新 ${filled} 天預報${t.homeTemp?'（含出發地）':''}`:'預報範圍未涵蓋旅程日期（太遠的未來抓不到，可手動輸入）',3600);
  }catch(e){console.warn(e);
    toast('抓取失敗（預報最多約 16 天內；更遠的請手動輸溫度）',3800)}
}
/* ---- 每天配一套 ---- */
function tripPickOutfit(tid,i){
  const t=TRIPS.find(x=>x.id===tid);const d=t.days[i];
  if(!OUTFITS.length){toast('還沒有任何搭配，先到「搭配」建立');return}
  /* 規則式建議：以單品適穿溫度與當天溫度的重疊度排序 */
  const scored=OUTFITS.map(o=>{
    let score=0,warn=[];
    if(d.tempMin!=null){
      const its=o.itemIds.map(itemById).filter(Boolean);
      let cover=0;
      its.forEach(it=>{
        if(it.tempMin<=d.tempMin&&it.tempMax>=d.tempMax)cover++;
        else if(it.tempMax<d.tempMin)warn.push((it.name||it.type)+'恐怕太熱（適穿上限低於當天低溫）');
        else if(it.tempMin>d.tempMax)warn.push((it.name||it.type)+'恐怕太涼（適穿下限高於當天高溫）');});
      score=its.length?cover/its.length:0;
    }else score=0.5;
    return{o,score,warn};
  }).sort((a,b)=>b.score-a.score);
  openModal(`
    <button class="close" onclick="closeModal()">✕</button>
    <h2>${fmtDate(d.date)}（${weekday(d.date)}）配一套</h2>
    <p class="hint">${d.tempMin!=null?`當天 ${d.tempMin}~${d.tempMax}°C，依「適穿溫度」排序（規則式建議，美感你決定）`
      :'這天還沒有溫度資料，順序未排；可先「輸溫度」再配。'}</p>
    <div class="picklist">
    ${scored.map(({o,score,warn})=>{
      const its=o.itemIds.map(itemById).filter(Boolean);
      return `<div class="outfitcard" onclick="tripAssign('${tid}',${i},'${o.id}')">
        <div class="thumbs">${its.slice(0,4).map(it=>`<img src="${urlCache.get(it)}">`).join('')}</div>
        <div style="flex:1;min-width:0"><b>${esc(o.name||'未命名')}</b>
          <div style="font-size:12px;color:var(--muted)">
            ${d.tempMin!=null?`合適度 ${(score*100).toFixed(0)}%`:''}
            ${(o.scenes||[]).map(s=>`<span class="chip cls">${esc(s)}</span>`).join('')}
            ${warn.length?`<div style="color:var(--warn)">⚠ ${esc(warn.slice(0,2).join('、'))}</div>`:''}
          </div></div></div>`}).join('')}
    </div>
    ${d.outfitId?`<button class="btn ghost sm" onclick="tripAssign('${tid}',${i},'')">改成不指定</button>`:''}`);
}

function copyText(elId,label){
  const txt=$(elId).textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast(label+'已複製'),()=>copyFallback(txt,label));
  }else copyFallback(txt,label);
}
function copyFallback(txt,label){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast(label+'已複製')}catch(e){toast('複製失敗，請手動選取')}
  ta.remove();
}

function vStats(){
  const totalWear=ITEMS.reduce((a,x)=>a+(x.wearCount||0),0);
  const ranked=ITEMS.filter(x=>x.wearCount>0).sort((a,b)=>b.wearCount-a.wearCount).slice(0,10);

  const months=SET.declutterMonths||6;
  const cutoff=new Date(Date.now()-months*30.44*86400000); /* 用平均月長，避免月底 setMonth 溢位 */

    const ref=x.lastWorn||x.createdAt||'';

        <td>${esc(x.type)}</td><td><b>${x.wearCount}</b></td><td>${fmtDate(x.lastWorn)}</td></tr>`).join('')}
      </table></div>`:'<p class="empty">還沒有穿著紀錄。在「搭配」按「今天穿」就會自動累計。</p>'}
    <div class="divider"></div>
    <div class="sec-title"><h2>🍂 斷捨離提醒</h2>
      <label class="field" style="flex-direction:row;align-items:center;gap:8px">超過
        <input type="number" value="${months}" min="1" max="36" style="width:70px;min-width:70px"
          onchange="SET.declutterMonths=Math.max(1,+this.value||6);saveSet();render()"> 個月沒穿</label></div>
    ${idle.length?`<p class="hint">這 ${idle.length} 件超過 ${months} 個月沒穿（含從未穿過的舊衣）：</p>
      <div class="itemgrid">${idle.map(itemCardHtml).join('')}</div>`
      :`<p class="empty">沒有超過 ${months} 個月未穿的衣物，衣櫃利用率不錯 👍</p>`}
  </div>`;
}

/* =====================================================================
   分頁 5：設定（個人檔案＋去背＋備份）
   ===================================================================== */
function vSet(){
  return `<div class="card">
    <h2>👤 個人檔案</h2>
    <div class="row" style="margin:8px 0">
      <label class="field">身高 cm<input type="number" id="sHeight" value="${esc(SET.height)}" style="width:90px;min-width:90px"></label>
      <label class="field">體重 kg<input type="number" id="sWeight" value="${esc(SET.weight)}" style="width:90px;min-width:90px"></label>
      <label class="field">體型描述<input type="text" id="sBody" placeholder="例：梨形、肩窄" value="${esc(SET.bodyType)}"></label>
    </div>
    <label class="field">個人搭配原則（會顯示在「搭配」頁提醒自己）
      <textarea id="sStyle" placeholder="例：上寬下窄；避免七分褲；顯白色系優先">${esc(SET.styleNotes)}</textarea></label>
    <p class="hint" style="margin-top:6px">誠實界線：工具只做「規則式」建議（色彩、場合、溫度）；
      「適合體型的美感判斷」機器做不可靠，所以提供
      <button class="icon" onclick="inspoSearch()">🔍 找參考穿搭</button>（Pinterest／WEAR，可選女生/男生/日系/韓系關鍵字），美感由你決定。</p>
    <button class="btn accent sm" onclick="setSaveProfile()">儲存個人檔案</button>
    <div class="divider"></div>
    <h2>🪄 自動去背設定</h2>
    <div class="row" style="margin:8px 0">
      <label class="field">模型
        <select id="sModel" onchange="SET.bgModel=this.value;saveSet()">
          <option value="auto" ${SET.bgModel==='auto'?'selected':''}>自動（手機用小模型、電腦用中模型）</option>
          <option value="small" ${SET.bgModel==='small'?'selected':''}>小模型（約 55MB，快、偶有毛邊）</option>
          <option value="medium" ${SET.bgModel==='medium'?'selected':''}>中模型（約 99MB，較細緻）</option>
        </select></label>
      <label class="switch"><input type="checkbox" ${SET.keepOriginal?'checked':''}
        onchange="SET.keepOriginal=this.checked;saveSet()">去背採用後保留原圖</label>
    </div>
    <p class="hint">首次去背需網路下載模型，之後由瀏覽器快取（快取被清掉時會重新下載）。
      每張約 10～30 秒（依裝置而定）。離線或失敗時，可在單品詳情「匯入去背 PNG」手動備援。</p>
    <div class="divider"></div>
    <h2>🧳 旅程自動排規則（重穿）</h2>
    <div class="row" style="margin:8px 0">
      <label class="field">上衣類可穿幾天（要洗前）
        <input type="number" min="1" max="10" value="${+SET.washTop||1}" style="width:80px;min-width:80px"
          onchange="SET.washTop=Math.max(1,+this.value||1);saveSet()"></label>
      <label class="field">褲子／裙子可穿幾天
        <input type="number" min="1" max="10" value="${+SET.washBottom||3}" style="width:80px;min-width:80px"
          onchange="SET.washBottom=Math.max(1,+this.value||3);saveSet()"></label>
    </div>
    <p class="hint">外套整趟可重複。「自動排整趟」會讓同件褲子外套跨天重穿、但每天重新組合；旅程有現場洗衣就把天數調大。</p>
    <div class="divider"></div>
    <h2>💾 備份與還原</h2>
    <p class="hint">資料只存在這台裝置的瀏覽器。換裝置、清瀏覽器資料前，先匯出備份（含照片）。</p>
    <div class="row">
      <button class="btn accent sm" onclick="backupExport()">📦 匯出備份（含照片）</button>
      <button class="btn ghost sm" onclick="backupImport()">📥 匯入備份</button>
      <button class="btn danger sm" onclick="del2(this,resetAll)">清空全部資料</button>
    </div>
    <p class="hint" id="storeInfo" style="margin-top:10px"></p>
    <div class="divider"></div>
    <p class="hint">📖 詳細操作說明請開同資料夾的 <a href="guide.html">guide.html</a>。<br>
      本工具不上傳任何資料；去背與所有處理都在你的瀏覽器內完成。</p>

}
async function setSaveProfile(){
  SET.height=$('sHeight').value;SET.weight=$('sWeight').value;
  SET.bodyType=$('sBody').value.trim();SET.styleNotes=$('sStyle').value.trim();
  await saveSet();toast('個人檔案已儲存');
}
/* ---- 備份：blob→dataURL ---- */
const blobToDataURL=b=>new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(b)});
async function dataURLToBlob(u){const r=await fetch(u);return await r.blob()}
async function backupExport(){
  toast('打包備份中…（照片多會稍等）');
  const items=[];
  for(const it of ITEMS){
    const o={...it};
    o.photo=it.photo?await blobToDataURL(it.photo):null;
    o.cut=it.cut?await blobToDataURL(it.cut):null;
    items.push(o);
  }
  const data={app:'wardrobe',ver:1,exportedAt:new Date().toISOString(),
    items,outfits:OUTFITS,trips:TRIPS,settings:SET};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`衣櫃備份_${todayStr()}.json`;
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast('備份已下載（'+(blob.size/1048576).toFixed(1)+' MB）');
}
function backupImport(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const data=JSON.parse(await f.text());
      if(data.app!=='wardrobe'||!Array.isArray(data.items))throw new Error('格式不符');
      if(ITEMS.length&&!confirm(`匯入會覆蓋現有資料（目前 ${ITEMS.length} 件）。確定？`))return;
      toast('還原中…');
      /* 先在記憶體把整份備份轉好、補預設欄位；全部成功才動資料庫（避免中途失敗把舊資料清掉） */
      const newItems=[];
      for(const o of data.items){
        if(!o.id)throw new Error('備份缺 id 欄位');
        const it={...o};
        it.photo=o.photo?await dataURLToBlob(o.photo):null;
        it.cut=o.cut?await dataURLToBlob(o.cut):null;
        it.seasons=Array.isArray(o.seasons)?o.seasons:[];
        it.wearCount=o.wearCount||0;
        newItems.push(it);
      }
      const newOutfits=(data.outfits||[]).filter(o=>o&&o.id).map(o=>({
        ...o,itemIds:Array.isArray(o.itemIds)?o.itemIds:[],layout:Array.isArray(o.layout)?o.layout:[],
        scenes:Array.isArray(o.scenes)?o.scenes:[],wearDates:Array.isArray(o.wearDates)?o.wearDates:[],
        conditions:o.conditions||{bike:false},transition:o.transition||{removable:'',addable:''}}));
      const newTrips=(data.trips||[]).filter(t=>t&&t.id).map(t=>({
        ...t,days:Array.isArray(t.days)?t.days:[]}));
      /* 轉檔全數成功，才清空並寫入 */
      await dbClear('items');await dbClear('outfits');await dbClear('trips');
      for(const it of newItems)await dbPut('items',it);
      for(const o of newOutfits)await dbPut('outfits',o);
      for(const t of newTrips)await dbPut('trips',t);
      if(data.settings){SET=Object.assign({},DEFAULT_SET,data.settings);await saveSet()}
      urlCache.m.forEach(u=>URL.revokeObjectURL(u));urlCache.m.clear();
      await loadAll();render();
      toast(`還原完成：${newItems.length} 件衣物`);
    }catch(e){console.warn(e);toast('匯入失敗（原資料未動）：'+(e.message||'檔案格式不符'),3600)}
  };
  inp.click();
}
async function resetAll(){
  await dbClear('items');await dbClear('outfits');await dbClear('trips');await dbClear('kv');
  urlCache.m.forEach(u=>URL.revokeObjectURL(u));urlCache.m.clear();
  ITEMS=[];OUTFITS=[];TRIPS=[];SET=Object.assign({},DEFAULT_SET);
  render();toast('已清空');
}
async function showStorage(){
  try{
    if(navigator.storage&&navigator.storage.estimate){
      const e=await navigator.storage.estimate();
      const el=$('storeInfo');
      if(el)el.textContent=`目前占用約 ${(e.usage/1048576).toFixed(1)} MB（瀏覽器配額 ${(e.quota/1073741824).toFixed(1)} GB）`
        +(persistGranted===true?' · 已取得持久儲存 ✔':persistGranted===false
          ?' · ⚠ 瀏覽器未授予持久儲存，長期不用可能被清資料——請定期匯出備份':'');
    }
  }catch(e){}
}

/* =====================================================================
   啟動
   ===================================================================== */
let persistGranted=null;
(async function boot(){
  try{
    await dbOpen();
    await loadAll();
    /* 申請 persistent storage：降低瀏覽器在空間壓力下清掉照片資料的風險 */
    try{if(navigator.storage&&navigator.storage.persist){
      persistGranted=await navigator.storage.persist()}}catch(e){}
    if(SET.lastTab&&TABS.some(([k])=>k===SET.lastTab))tab=SET.lastTab;
    render();
    if(tab==='set')showStorage();
    /* 每次切到設定頁刷新空間資訊 */
    const _go=go;window.go=k=>{_go(k);if(k==='set')showStorage()};
  }catch(e){
    document.getElementById('main').innerHTML=
      `<div class="notice">資料庫開啟失敗：${esc(e&&e.message||e)}<br>
       請確認瀏覽器允許本網頁使用儲存空間（無痕模式可能不支援）。</div>`;
  }
})();
</script>
